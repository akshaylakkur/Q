name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            target: darwin-arm64
            binary-name: qode
          - os: macos-13
            arch: x64
            target: darwin-x64
            binary-name: qode
          - os: windows-latest
            arch: x64
            target: win32-x64
            binary-name: qode.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Build binary
        run: node scripts/build-sea.mjs

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: qode-${{ matrix.target }}
          path: dist-native/${{ matrix.binary-name }}

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4

      - name: Place binaries in platform packages
        run: |
          mkdir -p npm/qode-darwin-arm64/bin
          mkdir -p npm/qode-darwin-x64/bin
          mkdir -p npm/qode-win32-x64/bin
          cp qode-darwin-arm64/qode npm/qode-darwin-arm64/bin/
          cp qode-darwin-x64/qode npm/qode-darwin-x64/bin/
          cp qode-win32-x64/qode.exe npm/qode-win32-x64/bin/

      - name: Publish platform packages
        run: |
          cd npm/qode-darwin-arm64 && pnpm publish --access public --no-git-checks
          cd ../qode-darwin-x64 && pnpm publish --access public --no-git-checks
          cd ../qode-win32-x64 && pnpm publish --access public --no-git-checks

      - name: Publish main package
        run: |
          cd npm/qode && pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
